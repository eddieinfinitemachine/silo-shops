<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silo Retail Targets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="hero-kicker">Silo Outreach Intelligence</p>
        <h1>Silo Retail Targets</h1>
        <p class="hero-subtitle">368 curated home goods &amp; gift shops across the US</p>
      </header>

      <section class="controls" aria-label="Shop Filters">
        <label class="control">
          <span>City</span>
          <select id="cityFilter">
            <option value="">All cities</option>
          </select>
        </label>

        <label class="control">
          <span>Category</span>
          <select id="categoryFilter">
            <option value="">All categories</option>
          </select>
        </label>

        <label class="control">
          <span>Price Tier</span>
          <select id="priceFilter">
            <option value="">All price tiers</option>
          </select>
        </label>

        <label class="control control-search">
          <span>Search</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Search by name, city, neighborhood, or vibe"
            autocomplete="off"
          />
        </label>
      </section>

      <section class="meta">
        <p id="resultsCount" aria-live="polite"></p>
      </section>

      <section id="cardGrid" class="card-grid" aria-label="Shops"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
